webleger.component.glossary.terms={"data":[\
{"term":"Hatha Yoga","def":"Discipline millénaire unissant Ha (soleil) et Tha (lune). Elle combine <ul><li>postures (asana),</li><li>respiration (pranayama)</li><li>et méditation</li></ul> pour équilibrer corps et esprit."}, \
{"term":"Yoga du Cachemire","def":"Approche <strong>douce</strong> et <strong>sensorielle</strong> du yoga, sans recherche de performance. On y entre dans les postures par l'écoute, la visualisation et le souffle."},\
{"term":"Méthode De Gasquet","def":"Méthode mise au point par le Dr Bernadette de Gasquet, axée sur la protection du dos et du périnée grâce ŕ l'auto-grandissement et une respiration physiologique."},\
{"term":"chaînes musculaires profondes","def":"Ensemble de muscles profonds qui stabilisent la colonne vertébrale et les articulations. Le Pilates et le Yoga les renforcent."},\
{"term":"rachis","def":"Nom anatomique de la colonne vertébrale. Sa décompression est un objectif clé du Pilates et du Yoga."},\
{"term":"asana","def":"Posture physique du yoga, tenue de façon stable et confortable, visant le renforcement et l'assouplissement du corps."},\
{"term":"pranayama","def":"Exercices de contrôle du souffle. «&nbsp;Prana&nbsp;» signifie énergie vitale, «&nbsp;ayama&nbsp;» extension. Calme le mental et revitalise le corps."}\
]}

